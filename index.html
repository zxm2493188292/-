<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收入记录器 - 楠楠团队 (增删全动态同步版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: #f4f6f9;
            color: #333;
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        select, input, button { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; outline: none; }
        select { min-width: 150px; }
        button { background: #3498db; color: white; border: none; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2980b9; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        .delete-btn { background: #e74c3c; padding: 6px 12px; font-size: 14px; }
        .delete-btn:hover { background: #c0392b; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #34495e; color: white; }
        .totals { margin-top: 20px; padding: 15px; background: #eef2f5; border-radius: 8px; font-size: 18px; }
        .person-total { display: flex; justify-content: space-between; margin: 8px 0; }
        .sync-bar {
            background: #eef9ff;
            color: #0066cc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #bce0ff;
        }
        .error-bar { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        
        /* 团队管理区域样式 */
        .manage-box { background: #fdf6ec; border: 1px solid #f5dab1; padding: 15px; border-radius: 8px; margin-bottom: 15px; color: #e6a23c; }
        .member-tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; padding: 10px; background: #fff; border-radius: 6px; border: 1px dashed #f5dab1; }
        .member-tag { background: #fdf6ec; color: #e6a23c; border: 1px solid #f5dab1; padding: 4px 8px; border-radius: 4px; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
        .member-tag .remove-icon { color: #f56c6c; cursor: pointer; font-weight: bold; font-size: 16px; }
        .member-tag .remove-icon:hover { color: #f5222d; }

        /* 【新增】图表容器样式 */
        .chart-box {
            background: #fff;
            border: 1px solid #e9ecef;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.02);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 收入记录器</h1>
        <p id="teamListOverview" style="text-align:center; color:#7f8c8d; margin-top: 0; font-size: 14px;">正在加载团队成员...</p>

        <div id="statusBar" class="sync-bar">
            <span id="statusText">🔄 正在连接 Supabase 国外极速总库...</span>
            <button onclick="initAppData()" style="padding:4px 8px; font-size:12px; background:#2ecc71;">手动刷新</button>
        </div>

        <div class="manage-box">
            <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 5px;">
                <strong style="color: #ca7c1e;">👥 队员管理：</strong>
                <input type="text" id="newMemberName" placeholder="输入新队员名字" style="width: 150px; padding: 6px 10px; font-size: 14px;">
                <button onclick="addTeamMember()" style="background: #e6a23c; padding: 6px 12px; font-size: 14px;">➕ 添加</button>
                <button onclick="toggleManageMode()" id="toggleManageBtn" style="background: #909399; padding: 6px 12px; font-size: 14px;">⚙️ 管理/删除成员</button>
            </div>
            <div id="memberDeletePanel" style="display: none; margin-top: 10px;">
                <span style="font-size: 13px; color: #ca7c1e;">⚠️ 点击名字后面的小红叉 <b>×</b> 即可从云端彻底删除该成员：</span>
                <div id="memberTagsList" class="member-tags-container"></div>
            </div>
        </div>

        <div style="margin-bottom: 30px; padding: 20px; background:#f8f9fa; border-radius:8px; border: 1px solid #e9ecef;">
            <h3>📝 新收入记录</h3>
            <select id="nameSelect">
                <option value="">正在加载人物...</option>
            </select>
            
            <select id="unitSelect" style="width:100px;">
                <option value="CNY">CNY (元)</option>
                <option value="KK">KK</option>
            </select>
            
            <input type="number" id="amount" placeholder="收入金额" style="width:140px;">
            <input type="text" id="remark" placeholder="备注 (可选)" style="width:200px;">
            <button id="submitBtn" onclick="addRecord()" disabled>连接中...</button>
        </div>

        <div class="totals" id="totals"></div>

        <div class="chart-box">
            <div id="revenueChart" style="width: 100%; height: 350px;"></div>
        </div>

        <h3>📋 所有记录 (Supabase 全球秒级多端同步)</h3>
        <button onclick="exportCSV()" style="margin-bottom:10px;">导出 CSV</button>
        
        <table id="recordTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>姓名</th>
                    <th>记录金额</th>
                    <th>备注</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        // 动态人员名单原始数据（包含 id 和 name）
        let memberRawData = [];
        let currentNames = [];
        let cloudRecords = [];
        let supabaseClient = null;
        let isManageMode = false;
        let myChart = null; // 【新增】图表实例变量

        // ==================== 【已自动填入你的专属安全密钥】 ====================
        const SUPABASE_URL = "https://iespzvwcoadvwrpjanvu.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_mkydSRHWTrKiSLsvnGuCtQ_r5gGvdZi";
        // =========================================================================

        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) {
            console.error("初始化失败");
        }

        window.onload = function() {
            // 【新增】初始化 ECharts 实例
            const chartDom = document.getElementById('revenueChart');
            myChart = echarts.init(chartDom);
            
            initAppData();

            // 监听窗口大小变化，使图表自适应
            window.addEventListener('resize', function() {
                if (myChart) myChart.resize();
            });
        }

        // 一键刷新人员和账本
        async function initAppData() {
            document.getElementById('submitBtn').disabled = true;
            const membersOk = await fetchTeamMembers();
            if(membersOk) {
                await fetchFromSupabase();
            }
        }

        function setStatus(text, isError = false) {
            const bar = document.getElementById('statusBar');
            const txt = document.getElementById('statusText');
            txt.innerText = text;
            if(isError) { bar.className = 'sync-bar error-bar'; } else { bar.className = 'sync-bar'; }
        }

        // ==================== 【以下是系统原有逻辑函数（保持并融合图表更新）】 ====================
        
        async function fetchTeamMembers() {
            try {
                setStatus("🔄 正在同步团队成员...");
                const { data, error } = await supabaseClient.from('team_members').select('*').order('created_at', { ascending: true });
                if(error) throw error;
                
                memberRawData = data || [];
                currentNames = memberRawData.map(m => m.name);
                
                // 更新页面显示
                document.getElementById('teamListOverview').innerText = "👥 当前团队成员：" + (currentNames.length > 0 ? currentNames.join('、') : '暂无队员');
                
                // 更新下拉菜单
                const nameSelect = document.getElementById('nameSelect');
                nameSelect.innerHTML = '<option value="">-- 请选择人员 --</option>';
                currentNames.forEach(name => {
                    nameSelect.innerHTML += `<option value="${name}">${name}</option>`;
                });
                
                // 更新删除面板的标签
                renderMemberTags();
                return true;
            } catch(e) {
                setStatus("❌ 获取团队成员失败: " + e.message, true);
                return false;
            }
        }

        function renderMemberTags() {
            const container = document.getElementById('memberTagsList');
            container.innerHTML = '';
            memberRawData.forEach(member => {
                container.innerHTML += `
                    <span class="member-tag">
                        ${member.name} 
                        <span class="remove-icon" onclick="deleteTeamMember(${member.id}, '${member.name}')">×</span>
                    </span>
                `;
            });
        }

        function toggleManageMode() {
            isManageMode = !isManageMode;
            const panel = document.getElementById('memberDeletePanel');
            const btn = document.getElementById('toggleManageBtn');
            if(isManageMode) {
                panel.style.display = 'block';
                btn.innerText = '🔒 关闭管理面板';
                btn.style.background = '#ca7c1e';
            } else {
                panel.style.display = 'none';
                btn.innerText = '⚙️ 管理/删除成员';
                btn.style.background = '#909399';
            }
        }

        async function addTeamMember() {
            const input = document.getElementById('newMemberName');
            const name = input.value.trim();
            if(!name) { alert("请输入名字！"); return; }
            if(currentNames.includes(name)) { alert("该成员已存在！"); return; }
            
            try {
                setStatus(`🔄 正在添加新成员 [${name}] ...`);
                const { error } = await supabaseClient.from('team_members').insert([{ name: name }]);
                if(error) throw error;
                input.value = '';
                await initAppData();
            } catch(e) {
                setStatus("❌ 添加成员失败: " + e.message, true);
            }
        }

        async function deleteTeamMember(id, name) {
            if(!confirm(`⚠️ 确定要彻底删除成员 [${name}] 吗？\n删除后他/她的历史所有收入记录仍会保留，但无法再选择他记账。`)) return;
            try {
                setStatus(`🔄 正在删除成员 [${name}] ...`);
                const { error } = await supabaseClient.from('team_members').delete().eq('id', id);
                if(error) throw error;
                await initAppData();
            } catch(e) {
                setStatus("❌ 删除成员失败: " + e.message, true);
            }
        }

        async function fetchFromSupabase() {
            try {
                setStatus("🔄 正在拉取最新的云端流水...");
                const { data, error } = await supabaseClient.from('revenue_records').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                cloudRecords = data || [];
                renderData();
                updateChartData(); // 【新增】每次拉取完新数据，同步更新曲线图
                setStatus("⚡ 云端数据已同步（多端实时更新中）");
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').innerText = "🚀 提交记录";
            } catch (e) {
                setStatus("❌ 同步失败: " + e.message, true);
            }
        }

        function renderData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            let totals = { CNY: 0, KK: 0 };
            let personTotals = {};

            currentNames.forEach(n => {
                personTotals[n] = { CNY: 0, KK: 0 };
            });

            cloudRecords.forEach(record => {
                const amount = parseFloat(record.amount);
                const unit = record.unit || 'CNY';
                
                if(totals[unit] !== undefined) totals[unit] += amount;
                if(personTotals[record.name]) personTotals[record.name][unit] += amount;

                const dateStr = new Date(record.created_at).toLocaleString('zh-CN', { hour12: false });

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${dateStr}</td>
                    <td><b>${record.name}</b></td>
                    <td style="color:${unit==='CNY'?'#27ae60':'#9b59b6'}; font-weight:bold;">${amount} ${unit}</td>
                    <td style="color:#666; font-size:14px;">${record.remark || '-'}</td>
                    <td><button class="delete-btn" onclick="deleteRecord('${record.id}')">删除</button></td>
                `;
                tbody.appendChild(tr);
            });

            // 渲染统计版块
            const totalsDiv = document.getElementById('totals');
            let html = `<h3>📊 实时业绩统计总览</h3>`;
            html += `<p><b>🔥 团队总收入：</b> <span style="color:#27ae60;font-size:22px;">${totals.CNY.toFixed(2)} CNY</span> | <span style="color:#9b59b6;font-size:22px;">${totals.KK.toFixed(2)} KK</span></p><hr style="border:none;border-top:1px dashed #ccc;">`;
            
            for (let person in personTotals) {
                html += `
                    <div class="person-total">
                        <span>👤 ${person}</span>
                        <span>
                            <span style="color:#27ae60;">${personTotals[person].CNY.toFixed(2)} CNY</span> / 
                            <span style="color:#9b59b6;">${personTotals[person].KK.toFixed(2)} KK</span>
                        </span>
                    </div>
                `;
            }
            totalsDiv.innerHTML = html;
        }

        async function addRecord() {
            const name = document.getElementById('nameSelect').value;
            const unit = document.getElementById('unitSelect').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const remark = document.getElementById('remark').value.trim();

            if (!name) { alert('请先选择一个团队成员！'); return; }
            if (isNaN(amount) || amount <= 0) { alert('请输入正确的收益金额！'); return; }

            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = "发送中...";

            try {
                const { error } = await supabaseClient.from('revenue_records').insert([{ name, amount, unit, remark }]);
                if (error) throw error;

                document.getElementById('amount').value = '';
                document.getElementById('remark').value = '';
                await fetchFromSupabase();
            } catch (e) {
                alert('添加失败: ' + e.message);
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').innerText = "🚀 提交记录";
            }
        }

        async function deleteRecord(id) {
            if (!confirm('确定要删除这条记录吗？云端将同步抹除！')) return;
            try {
                setStatus("🔄 正在请求云端删除...");
                const { error } = await supabaseClient.from('revenue_records').delete().eq('id', id);
                if (error) throw error;
                await fetchFromSupabase();
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }

        function exportCSV() {
            if(cloudRecords.length === 0) { alert("当前没有数据可导出！"); return; }
            let csvContent = "\uFEFF日期,姓名,金额,币种,备注\n";
            cloudRecords.forEach(r => {
                const dateStr = new Date(r.created_at).toLocaleString('zh-CN', { hour12: false }).replace(/,/g, ' ');
                csvContent += `"${dateStr}","${r.name}",${r.amount},"${r.unit || 'CNY'}","${(r.remark || '').replace(/"/g, '""')}"\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `楠楠团队收入报表_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ==================== 【新增核心：按收益从高到低排序并生成曲线图】 ====================
        function updateChartData() {
            if (!myChart) return;

            // 1. 按日期归总每天的 CNY 收益
            let dailyMap = {};
            cloudRecords.forEach(record => {
                // 默认统计 CNY 数据。如果想统计 KK 或者是总收益，可以改这里
                if ((record.unit || 'CNY') === 'CNY') {
                    // 截取格式为 YYYY-MM-DD 的日期
                    const dateKey = new Date(record.created_at).toISOString().split('T')[0];
                    const amount = parseFloat(record.amount) || 0;
                    dailyMap[dateKey] = (dailyMap[dateKey] || 0) + amount;
                }
            });

            // 2. 将对象转为数组，方便进行【高到低排序】
            let chartDataArray = [];
            for (let date in dailyMap) {
                chartDataArray.push({
                    date: date,
                    revenue: dailyMap[date]
                });
            }

            // 【核心改动】：按每天的总收益从高到低进行降序排列
            chartDataArray.sort((a, b) => b.revenue - a.revenue);

            // 3. 提取排序后的 X 轴（日期）和 Y 轴（金额）
            const dates = chartDataArray.map(item => item.date);
            const revenues = chartDataArray.map(item => item.revenue);

            // 4. 配置 ECharts 折线/曲线图参数
            const option = {
                title: {
                    text: '📈 每日总收益曲线图 (CNY)',
                    subtext: '数据已按收益金额从高到低进行排列',
                    left: 'center',
                    textStyle: { color: '#2c3e50', fontSize: 16 }
                },
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        let relVal = params[0].name;
                        relVal += '<br/>💰 当日收益 : <b style="color:#27ae60">' + params[0].value.toFixed(2) + '</b> 元';
                        return relVal;
                    }
                },
                grid: {
                    left: '4%',
                    right: '4%',
                    bottom: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisLabel: {
                        interval: 0,
                        rotate: 30, // 略微旋转防日期重叠
                        color: '#666'
                    },
                    axisLine: { lineStyle: { color: '#ccc' } }
                },
                yAxis: {
                    type: 'value',
                    name: '收益 (元)',
                    nameTextStyle: { color: '#666' },
                    axisLabel: { color: '#666' },
                    splitLine: { lineStyle: { type: 'dashed', color: '#eee' } }
                },
                series: [{
                    name: '总收益',
                    data: revenues,
                    type: 'line',
                    smooth: true, // 开启平滑曲线
                    symbolSize: 8,
                    lineStyle: {
                        color: '#3498db',
                        width: 3
                    },
                    itemStyle: {
                        color: '#3498db',
                        borderWidth: 2
                    },
                    // 渐变填充阴影区，让曲线图更好看
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(52, 152, 219, 0.4)' },
                            { offset: 1, color: 'rgba(52, 152, 219, 0.0)' }
                        ])
                    }
                }]
            };

            // 5. 渲染图表
            myChart.setOption(option, true);
        }
    </script>
</body>
</html>
