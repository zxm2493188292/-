<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收入记录器 - 楠楠团队 (多端完美同步版)</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: #f4f6f9;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        select, input, button {
            padding: 10px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        select { min-width: 150px; }
        button {
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2980b9; }
        .delete-btn {
            background: #e74c3c;
            padding: 6px 12px;
            font-size: 14px;
        }
        .delete-btn:hover { background: #c0392b; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: #34495e; color: white; }
        .totals {
            margin-top: 20px;
            padding: 15px;
            background: #eef2f5;
            border-radius: 8px;
            font-size: 18px;
        }
        .person-total {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }
        /* 云同步顶栏 */
        .sync-bar {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-left: 5px solid #3498db;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 收入记录器</h1>
        <p style="text-align:center; color:#7f8c8d; margin-top: 0;">楠楠、星辰、哈哈、小美、牛爷爷、涵涵、拉朵、朵拉、伊怡、雪悦</p>

        <!-- 云同步管理栏 -->
        <div class="sync-bar">
            <div>
                <strong style="color: #2c3e50;">🔐 团队同步暗号：</strong>
                <!-- 这里你可以直接把 value 改成你们团队固定的暗号，这样任何浏览器打开默认就是这个 -->
                <input type="text" id="syncKey" placeholder="输入专属暗号" style="width: 220px;" value="nannan_team_2026" onchange="onKeyChange()">
                <span id="syncStatus" style="margin-left: 10px; font-size: 14px; color: #f39c12; font-weight: bold;">正在连接云端...</span>
            </div>
            <div>
                <button onclick="uploadToCloud(false)" style="background: #2ecc71;">⬆️ 推送修改</button>
                <button onclick="downloadFromCloud(false)" style="background: #f39c12;">⬇️ 刷新/拉取云端</button>
            </div>
        </div>

        <!-- 记录表单 -->
        <div style="margin-bottom: 30px; padding: 20px; background:#f8f9fa; border-radius:8px; border: 1px solid #e9ecef;">
            <h3>📝 新收入记录</h3>
            <select id="nameSelect">
                <option value="">选择人物</option>
                <option value="楠楠">楠楠</option>
                <option value="星辰">星辰</option>
                <option value="哈哈">哈哈</option>
                <option value="小美">小美</option>
                <option value="牛爷爷">牛爷爷</option>
                <option value="涵涵">涵涵</option>
                <option value="拉朵">拉朵</option>
                <option value="朵拉">朵拉</option>
                <option value="伊怡">伊怡</option>
                <option value="雪悦">雪悦</option>
            </select>
            
            <select id="unitSelect" style="width:100px;">
                <option value="CNY">CNY (元)</option>
                <option value="KK">KK</option>
            </select>
            
            <input type="number" id="amount" placeholder="收入金额" style="width:140px;">
            <input type="text" id="remark" placeholder="备注 (可选)" style="width:200px;">
            <button onclick="addRecord()">记录收入</button>
        </div>

        <!-- 统计 -->
        <div class="totals" id="totals"></div>

        <!-- 记录表格 -->
        <h3>📋 所有记录</h3>
        <button onclick="exportCSV()" style="margin-bottom:10px;">导出 CSV</button>
        <button onclick="clearAllData()" style="margin-bottom:10px; background:#e74c3c;">清空本地数据</button>
        
        <table id="recordTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>姓名</th>
                    <th>记录金额</th>
                    <th>备注</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        const NAMES = ["楠楠", "星辰", "哈哈", "小美", "牛爷爷", "涵涵", "拉朵", "朵拉", "伊怡", "雪悦"];
        
        window.onload = function() {
            const savedKey = localStorage.getItem('nn_sync_key');
            if (savedKey) {
                document.getElementById('syncKey').value = savedKey;
            }
            loadRecords();
            // 开屏自动联网追溯该暗号在全网最新的账本
            downloadFromCloud(true);
        }

        // 当用户手动修改暗号时触发
        function onKeyChange() {
            const key = document.getElementById('syncKey').value.trim();
            localStorage.setItem('nn_sync_key', key);
            downloadFromCloud(true);
        }

        function loadRecords() {
            const records = JSON.parse(localStorage.getItem('incomeRecords') || '[]');
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            records.forEach((record, index) => {
                const displayAmount = record.originalAmount !== undefined 
                    ? `${record.originalAmount.toLocaleString()} ${record.unit}` 
                    : `${parseFloat(record.amount).toLocaleString()} CNY`;
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${record.date}</td>
                    <td>${record.name}</td>
                    <td style="text-align:right; font-weight:bold; color:#2c3e50;">${displayAmount}</td>
                    <td>${record.remark || ''}</td>
                    <td><button class="delete-btn" onclick="deleteRecord(${index})">删除</button></td>
                `;
                tbody.appendChild(tr);
            });
            updateTotals(records);
        }
        
        function addRecord() {
            const nameSelect = document.getElementById('nameSelect');
            const unitSelect = document.getElementById('unitSelect');
            const amountInput = document.getElementById('amount');
            const remarkInput = document.getElementById('remark');
            
            const name = nameSelect.value;
            const unit = unitSelect.value;
            let amount = parseFloat(amountInput.value);
            
            if (!name) { alert('请选择人物！'); return; }
            if (!amount || amount <= 0) { alert('请输入有效金额！'); return; }
            
            if (unit === 'KK') { amount = amount / 13500; }
            
            const records = JSON.parse(localStorage.getItem('incomeRecords') || '[]');
            records.unshift({
                date: new Date().toLocaleString('zh-CN'),
                name: name,
                amount: amount,        
                originalAmount: parseFloat(amountInput.value),
                unit: unit,
                remark: remarkInput.value.trim()
            });
            
            localStorage.setItem('incomeRecords', JSON.stringify(records));
            
            amountInput.value = '';
            remarkInput.value = '';
            nameSelect.value = '';
            
            loadRecords();
            // 记账后自动静默同步到云端
            uploadToCloud(true);
        }
        
        function deleteRecord(index) {
            if (!confirm('确定删除这条记录吗？')) return;
            let records = JSON.parse(localStorage.getItem('incomeRecords') || '[]');
            records.splice(index, 1);
            localStorage.setItem('incomeRecords', JSON.stringify(records));
            loadRecords();
            // 删除后自动静默同步到云端
            uploadToCloud(true);
        }
        
        function updateTotals(records) {
            const totalsDiv = document.getElementById('totals');
            let html = '<h3>📊 收入统计</h3>';
            
            const personTotals = {};
            NAMES.forEach(name => personTotals[name] = 0);
            let grandTotal = 0;
            
            records.forEach(r => {
                if (personTotals[r.name] !== undefined) {
                    personTotals[r.name] += parseFloat(r.amount);
                    grandTotal += parseFloat(r.amount);
                }
            });
            
            html += `<div class="person-total"><strong>总收入总量</strong><span style="font-size:22px; color:#27ae60;">¥ ${grandTotal.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2})}</span></div>`;
            NAMES.forEach(name => {
                const total = personTotals[name];
                if (total > 0) {
                    html += `<div class="person-total"><span>${name}</span><span>¥ ${total.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2})}</span></div>`;
                }
            });
            totalsDiv.innerHTML = html;
        }

        // ==================== 【无视浏览器限制·全局自动追溯引擎】 ====================
        function getCleanKey() {
            const key = document.getElementById('syncKey').value.trim();
            if(!key) { alert('请先输入团队同步暗号！'); return null; }
            localStorage.setItem('nn_sync_key', key);
            return key.replace(/[^a-zA-Z0-9]/g, ''); 
        }

        // 上传：无论哪个浏览器，只要点了就强制重写云端该口令的数据
        async function uploadToCloud(isAuto = false) {
            const key = getCleanKey();
            if(!key) return;
            const records = localStorage.getItem('incomeRecords') || '[]';
            document.getElementById('syncStatus').style.color = '#f39c12';
            document.getElementById('syncStatus').innerText = '⏳ 正在同步云端...';

            try {
                const response = await fetch(`https://api.restful-api.dev/objects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: `nannan_team_pro_${key}`,
                        data: { records: records }
                    })
                });

                if(response.ok) {
                    document.getElementById('syncStatus').style.color = '#2ecc71';
                    document.getElementById('syncStatus').innerText = '✅ 云端已同步(' + new Date().toLocaleTimeString() + ')';
                    if(!isAuto) alert('🚀 数据已成功推送到云端总库！');
                } else {
                    throw new Error();
                }
            } catch (e) {
                document.getElementById('syncStatus').style.color = '#e74c3c';
                document.getElementById('syncStatus').innerText = '❌ 同步失败';
            }
        }

        // 下载：不再依赖本地缓存的ID，而是通过“暗号”直接去云端大总库里捞最新切片
        async function downloadFromCloud(isAuto = false) {
            const key = getCleanKey();
            if(!key) return;
            document.getElementById('syncStatus').style.color = '#f39c12';
            document.getElementById('syncStatus').innerText = '⏳ 正在检索云端总库...';

            try {
                // 直接拉取公共池，无视浏览器隔离，全网追溯该暗号最新的那份账本
                const listRes = await fetch(`https://api.restful-api.dev/objects`);
                if(!listRes.ok) throw new Error();
                
                const list = await listRes.json();
                // 倒序寻找最新上传的属于这个暗号的数据对象
                const myCloudObj = list.reverse().find(item => item.name === `nannan_team_pro_${key}`);
                
                if (myCloudObj && myCloudObj.id) {
                    // 精准二次拉取内容
                    const res = await fetch(`https://api.restful-api.dev/objects/${myCloudObj.id}`);
                    if(res.ok) {
                        const result = await res.json();
                        if(result && result.data && result.data.records) {
                            const cloudData = result.data.records;
                            
                            // 核心修复：如果是全新浏览器（本地为空），或者云端有更新，直接自动同步
                            const localData = localStorage.getItem('incomeRecords') || '[]';
                            if (isAuto) {
                                // 如果本地没数据，或者手动切换了新浏览器，直接拉取覆盖，实现无缝连通
                                localStorage.setItem('incomeRecords', cloudData);
                                loadRecords();
                                document.getElementById('syncStatus').style.color = '#2ecc71';
                                document.getElementById('syncStatus').innerText = '✅ 云端数据加载成功';
                            } else {
                                if(confirm('☁️ 确定要从云端总库同步最新账目吗？这将覆盖当前浏览器上的内容。')) {
                                    localStorage.setItem('incomeRecords', cloudData);
                                    loadRecords();
                                    document.getElementById('syncStatus').style.color = '#2ecc71';
                                    document.getElementById('syncStatus').innerText = '✅ 手动刷新完成';
                                    alert('🎉 账本已同步到全队最新状态！');
                                }
                            }
                            return;
                        }
                    }
                }
                
                // 如果云端搜不到这个暗号房间
                document.getElementById('syncStatus').style.color = '#7f8c8d';
                document.getElementById('syncStatus').innerText = '☁️ 云端新房间(请先记账或点推送)';
                
            } catch (e) {
                document.getElementById('syncStatus').style.color = '#e74c3c';
                document.getElementById('syncStatus').innerText = '❌ 网络拉取失败';
            }
        }

        function exportCSV() {
            const records = JSON.parse(localStorage.getItem('incomeRecords') || '[]');
            if (records.length === 0) { alert('没有记录可导出！'); return; }
            let csv = "\uFEFF日期,姓名,统一换算CNY,备注\n";
            records.forEach(r => { csv += `"${r.date}","${r.name}",${r.amount},"${r.remark || ''}"\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `收入记录_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }
        
        function clearAllData() {
            if (!confirm('⚠️ 确定要清空本地数据吗？（不会影响云端总库，再次刷新即可拉回）')) return;
            localStorage.removeItem('incomeRecords');
            loadRecords();
        }
    </script>
</body>
</html>
